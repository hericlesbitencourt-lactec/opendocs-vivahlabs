  /exames/processamentos/{processamentoId}/finalizar-revisao-1:
    post:
      tags:
        - Revisão IA
      summary: Confirmar revisão e salvar correções dos resultados
      description: |
        Conclui um processamento do tipo `REVISAO_1`, persistindo as correções feitas pelo operador sobre os resultados extraídos pela IA.
        O processamento é considerado `REVISAO_1` quando ao menos um de seus itens tem suporte à interpretação por IA.
        Após a confirmação, o processamento transiciona para `CONCLUIDO`.

        **Campos opcionais do processamento:**
        - `laboratorioDetectado`: corrige o nome do laboratório detectado pela IA. Só é atualizado se for enviado no body.
        - `dataRealizacao`: corrige a data do exame (formato ISO-8601). Só é atualizado se for enviado no body.

        **Edição por resultado (`resultado.id`):**
        - O body usa `resultados[]` diretamente (não precisa enviar `exames[].id`).
        - Cada item de `resultados` deve conter:
          - `id`: id do `ResultadoExameItem`.
          - `unidadeMedida` (opcional): se enviado, atualiza a unidade detectada no PDF.
          - `valores[]`: pares `label` e `valor` para editar resultado e referência.
        - Labels aceitas (exatas): `Resultado`, `Min`, `Max`, `Referência`.
        - Para resultado numérico: usar `Resultado`, `Min` e `Max` (não usar `Referência`).
        - Para resultado textual: usar `Resultado` e, quando necessário, `Referência`.
        - Omitir uma label => não altera aquele campo.
        - Enviar `valor: null` para uma label => limpa aquele campo.
      parameters:
        - name: processamentoId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              dataRealizacao: "2026-04-09T00:00:00.000Z"
              laboratorioDetectado: "Laboratório Exemplo"
              resultados:
                - id: "resultado-hemoglobina-id"
                  unidadeMedida: "g/dL"
                  valores:
                    - label: "Resultado"
                      valor: "15.22"
                    - label: "Min"
                      valor: "13.5"
                    - label: "Max"
                      valor: "17.5"
                - id: "resultado-hiv-id"
                  unidadeMedida: null
                  valores:
                    - label: "Resultado"
                      valor: "não reagente"
                    - label: "Referência"
                      valor: "não reagente"
                - id: "resultado-creatinina-id"
                  valores:
                    - label: "Resultado"
                      valor: null
                    - label: "Min"
                      valor: null
                    - label: "Max"
                      valor: null
      responses:
        '200':
          description: Correções persistidas. O processamento transicionou para `CONCLUIDO`.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "CONCLUIDO"
        '400':
          description: |
            Regra de negócio violada. Pode retornar três mensagens distintas:
            - `"Somente processamentos aguardando revisão podem ser finalizados."` — o processamento não está em `AGUARDANDO_REVISAO`.
            - `"Este processamento não requer revisão com interpretação de IA."` — o `tipoRevisao` calculado para este processamento é `REVISAO_2` (nenhum item possui suporte à IA).
            - `"Um ou mais resultados informados não pertencem a este processamento."` — algum `resultado.id` não está vinculado a este processamento.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos aguardando revisão podem ser finalizados."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-1"
                  method: "POST"
        '422':
          description: |
            Falha de validação do contrato de `valores[]`. Exemplos de mensagens retornadas:
            - `"O campo \"XYZ\" não é reconhecido. Use \"Resultado\", \"Min\", \"Max\" ou \"Referência\"."` — label fora do conjunto permitido.
            - `"O campo \"Resultado\" foi informado mais de uma vez no mesmo resultado."` — label duplicada.
            - `"O campo \"Referência\" não pode ser usado em resultados numéricos. Use \"Min\" e \"Max\" para informar a faixa de referência."` — label incompatível com o tipo numérico.
            - `"Os campos \"Min\" e \"Max\" não podem ser usados em resultados textuais. Use \"Referência\" para informar o valor de referência."` — label incompatível com o tipo textual.
            - `"O valor informado para o resultado não é um número válido."` — valor não conversível para numérico.
            - `"O valor informado para o campo \"Min\" não é um número válido."` — valor de referência Min inválido.
            - `"O valor informado para o campo \"Max\" não é um número válido."` — valor de referência Max inválido.
          content:
            application/json:
              example:
                error:
                  message: "O campo \"XYZ\" não é reconhecido. Use \"Resultado\", \"Min\", \"Max\" ou \"Referência\"."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-1"
                  method: "POST"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-1"
                  method: "POST"

  /exames/processamentos/{processamentoId}/finalizar-revisao-2:
    post:
      tags:
        - Revisão IA
      summary: Confirmar revisão e salvar observação do laudo
      description: |
        Conclui um processamento do tipo `REVISAO_2`, persistindo a observação inserida pelo operador.
        Após a confirmação, o processamento transiciona para `CONCLUIDO`.

        Não há edição de resultados tabelados nessa rota. Para corrigir resultados e referências (`resultados[].valores[]`), use a rota `finalizar-revisao-1`.

        **Campos opcionais:**
        - `observacao`: texto livre com o laudo revisado. Só é atualizada se for enviada no body. Se vier como `null` ou vazio, a observação é limpa.
        - `laboratorioDetectado`: corrige o nome do laboratório detectado pela IA. Só é atualizado se for enviado no body.
        - `dataRealizacao`: corrige a data do exame (formato ISO-8601). Só é atualizada se for enviada no body.

        Retorna `400` se o processamento tiver ao menos um item com suporte à IA (fluxo `REVISAO_1`) ou não estiver em `AGUARDANDO_REVISAO`.
      parameters:
        - name: processamentoId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              observacao: "Laudo revisado manualmente."
      responses:
        '200':
          description: Observação persistida. O processamento transicionou para `CONCLUIDO`.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "CONCLUIDO"
        '400':
          description: |
            Regra de negócio violada. Pode retornar duas mensagens distintas:
            - `"Somente processamentos aguardando revisão podem ser finalizados."` — o processamento não está em `AGUARDANDO_REVISAO`.
            - `"Este processamento requer revisão com interpretação de IA, não revisão manual."` — o `tipoRevisao` calculado para este processamento é `REVISAO_1` (pelo menos um item possui suporte à IA).
          content:
            application/json:
              example:
                error:
                  message: "Este processamento requer revisão com interpretação de IA, não revisão manual."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-2"
                  method: "POST"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-2"
                  method: "POST"
