openapi: 3.0.3
info:
  title: API VivaLabs
  version: 1.0.0
  description: |
    Documentação das rotas de ações de processamentos (VivaLabs) de unificação de exames e fluxos de revisão IA.
paths:
  /exames/unificacoes/pacientes/{pacienteId}:
    get:
      tags:
        - Unificação de exames
      summary: Buscar resumo de unificação por paciente
      description: |
        Retorna o resumo da unificação de exames do paciente.

        A resposta é dividida em:
        - `examesNaoUnificados`: exames elegíveis para unificação e ainda sem grupo.
        - `examesUnificados`: grupos de unificação já montados, aguardando upload de PDF.
        - `arquivoPdfUrl`: quando presente, retorna a key/path interna do arquivo no storage (sem `https://`).

        Cada exame informa `leituraIaHabilitada`, usado pela aplicação para saber se o conjunto pode seguir no fluxo com interpretação estruturada por IA.
      parameters:
        - name: pacienteId
          in: path
          required: true
          description: ID do paciente
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resumo de unificação retornado com sucesso.
          content:
            application/json:
              example:
                examesNaoUnificados:
                  - id: "4e908988-17a6-4f49-96c0-7198d30a2013"
                    pedidoExameId: "f3d1aaf9-e964-4dd0-a8aa-8a929d9d104d"
                    nome: "Hemograma Completo"
                    tipo: "LABORATORIAL"
                    leituraIaHabilitada: true
                    consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                    dataSolicitacao: "2026-04-10T10:00:00.000Z"
                  - id: "2d3f645a-c587-478f-a09f-71ef10048bc6"
                    pedidoExameId: "8cb473a0-3cae-4f14-998d-b4f5d5f1e4f0"
                    nome: "Ultrassonografia de Abdome Total"
                    tipo: "IMAGEM"
                    leituraIaHabilitada: false
                    consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                    dataSolicitacao: "2026-04-10T10:00:00.000Z"
                examesUnificados:
                  - id: "dc2f4db2-7750-4f7a-bb90-97de104c0d67"
                    codigoGrupo: 1
                    status: "PENDENTE_UPLOAD"
                    arquivoPdfUrl: null
                    mensagemErro: null
                    exames:
                      - id: "c98f2f53-99ea-4734-8070-cd6ebc66f6bc"
                        pedidoExameId: "bf811ea2-2cb3-4a3d-a70c-cf5c47a1d7dd"
                        nome: "Glicose em Jejum"
                        tipo: "LABORATORIAL"
                        leituraIaHabilitada: true
                        consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                        dataSolicitacao: "2026-04-10T10:00:00.000Z"
                      - id: "7f7b1777-d9b8-4d89-973f-4677671ec8ab"
                        pedidoExameId: "754df56c-93d1-4076-8eb8-c08c2be57c15"
                        nome: "Colesterol Total"
                        tipo: "LABORATORIAL"
                        leituraIaHabilitada: true
                        consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                        dataSolicitacao: "2026-04-10T10:00:00.000Z"
        '404':
          description: Paciente não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Paciente não encontrado."
                  status: 404
                  timestamp: "2026-04-13T10:00:00.000Z"
                  path: "/exames/unificacoes/pacientes/id"
                  method: "GET"
        '422':
          description: "Parâmetro inválido (ex.: `pacienteId` fora de formato UUID)."
          content:
            application/json:
              example:
                error:
                  message: "Erro na validação dos parâmetros: ID do paciente inválido"
                  status: 422
                  timestamp: "2026-04-13T10:00:00.000Z"
                  path: "/exames/unificacoes/pacientes/id"
                  method: "GET"

  /exames/unificacoes:
    post:
      tags:
        - Unificação de exames
      summary: Unificar exames e/ou grupos de um paciente
      description: |
        Cria ou atualiza grupos de unificação com base em exames não unificados (`exameIds`) e grupos existentes (`grupoIds`).

        Regras de negócio principais:
        - É obrigatório enviar ao menos um item em `exameIds` ou `grupoIds`.
        - Se houver apenas exames individuais, é necessário selecionar pelo menos 2 para criar um novo grupo.
        - Não é permitido misturar tipos de exame laboratoriais com imagem/outros no mesmo grupo.
        - Não é permitido misturar exames com leitura por IA habilitada e exames sem leitura por IA no mesmo grupo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pacienteId
              properties:
                pacienteId:
                  type: string
                  format: uuid
                exameIds:
                  type: array
                  description: IDs de exames não unificados a incluir.
                  default: []
                  items:
                    type: string
                    format: uuid
                grupoIds:
                  type: array
                  description: IDs de grupos de unificação a mesclar/incluir.
                  default: []
                  items:
                    type: string
                    format: uuid
            examples:
              apenasExames:
                summary: Criar grupo novo a partir de exames não unificados
                value:
                  pacienteId: "9b2d29b6-c8df-4f8b-8b84-c2b51fb1fd5d"
                  exameIds:
                    - "4e908988-17a6-4f49-96c0-7198d30a2013"
                    - "c98f2f53-99ea-4734-8070-cd6ebc66f6bc"
              examesEGrupo:
                summary: Incluir exame em grupo já existente
                value:
                  pacienteId: "9b2d29b6-c8df-4f8b-8b84-c2b51fb1fd5d"
                  exameIds:
                    - "7f7b1777-d9b8-4d89-973f-4677671ec8ab"
                  grupoIds:
                    - "dc2f4db2-7750-4f7a-bb90-97de104c0d67"
      responses:
        '200':
          description: Unificação concluída e resumo atualizado retornado.
          content:
            application/json:
              example:
                examesNaoUnificados:
                  - id: "2d3f645a-c587-478f-a09f-71ef10048bc6"
                    pedidoExameId: "8cb473a0-3cae-4f14-998d-b4f5d5f1e4f0"
                    nome: "Ultrassonografia de Abdome Total"
                    tipo: "IMAGEM"
                    leituraIaHabilitada: false
                    consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                    dataSolicitacao: "2026-04-10T10:00:00.000Z"
                examesUnificados:
                  - id: "dc2f4db2-7750-4f7a-bb90-97de104c0d67"
                    codigoGrupo: 1
                    status: "PENDENTE_UPLOAD"
                    arquivoPdfUrl: null
                    mensagemErro: null
                    exames:
                      - id: "4e908988-17a6-4f49-96c0-7198d30a2013"
                        pedidoExameId: "f3d1aaf9-e964-4dd0-a8aa-8a929d9d104d"
                        nome: "Hemograma Completo"
                        tipo: "LABORATORIAL"
                        leituraIaHabilitada: true
                        consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                        dataSolicitacao: "2026-04-10T10:00:00.000Z"
                      - id: "c98f2f53-99ea-4734-8070-cd6ebc66f6bc"
                        pedidoExameId: "bf811ea2-2cb3-4a3d-a70c-cf5c47a1d7dd"
                        nome: "Glicose em Jejum"
                        tipo: "LABORATORIAL"
                        leituraIaHabilitada: true
                        consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                        dataSolicitacao: "2026-04-10T10:00:00.000Z"
        '400':
          description: |
            Regra de negócio da unificação não atendida. Exemplos de mensagens:
            - `"Selecione pelo menos 2 exames não unificados para criar um grupo."`
            - `"Não é possível unificar exames de laboratório com exames de imagens ou do tipo outros."`
            - `"Não é possível unificar exames que a IA lê com exames que a IA não lê."`
          content:
            application/json:
              example:
                error:
                  message: "Não é possível unificar exames de laboratório com exames de imagens ou do tipo outros."
                  status: 400
                  timestamp: "2026-04-13T10:00:00.000Z"
                  path: "/exames/unificacoes"
                  method: "POST"
        '404':
          description: Paciente não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Paciente não encontrado."
                  status: 404
                  timestamp: "2026-04-13T10:00:00.000Z"
                  path: "/exames/unificacoes"
                  method: "POST"
        '422':
          description: |
            Erro de validação do payload (UUIDs inválidos ou nenhum item selecionado).
            Exemplo de mensagem:
            - `"Erro na validação: É necessário selecionar ao menos um exame não unificado ou um grupo."`
          content:
            application/json:
              example:
                error:
                  message: "Erro na validação: É necessário selecionar ao menos um exame não unificado ou um grupo."
                  status: 422
                  timestamp: "2026-04-13T10:00:00.000Z"
                  path: "/exames/unificacoes"
                  method: "POST"

  /exames/unificacoes/{grupoId}:
    delete:
      tags:
        - Unificação de exames
      summary: Cancelar grupo de unificação
      description: |
        Remove o grupo de unificação informado, desvinculando seus exames para voltarem à lista de não unificados.

        Após o cancelamento, a API retorna o resumo atualizado do paciente.
      parameters:
        - name: grupoId
          in: path
          required: true
          description: ID do grupo de unificação
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Grupo cancelado e resumo atualizado retornado.
          content:
            application/json:
              example:
                examesNaoUnificados:
                  - id: "4e908988-17a6-4f49-96c0-7198d30a2013"
                    pedidoExameId: "f3d1aaf9-e964-4dd0-a8aa-8a929d9d104d"
                    nome: "Hemograma Completo"
                    tipo: "LABORATORIAL"
                    leituraIaHabilitada: true
                    consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                    dataSolicitacao: "2026-04-10T10:00:00.000Z"
                  - id: "c98f2f53-99ea-4734-8070-cd6ebc66f6bc"
                    pedidoExameId: "bf811ea2-2cb3-4a3d-a70c-cf5c47a1d7dd"
                    nome: "Glicose em Jejum"
                    tipo: "LABORATORIAL"
                    leituraIaHabilitada: true
                    consultaId: "8a2b1148-f5a1-4549-8ed0-5992fc6b10c4"
                    dataSolicitacao: "2026-04-10T10:00:00.000Z"
                examesUnificados: []
        '404':
          description: Grupo de unificação não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Grupo de unificação não encontrado."
                  status: 404
                  timestamp: "2026-04-13T10:00:00.000Z"
                  path: "/exames/unificacoes/id"
                  method: "DELETE"
        '422':
          description: "Parâmetro inválido (ex.: `grupoId` fora de formato UUID)."
          content:
            application/json:
              example:
                error:
                  message: "Erro na validação dos parâmetros: ID do grupo inválido"
                  status: 422
                  timestamp: "2026-04-13T10:00:00.000Z"
                  path: "/exames/unificacoes/id"
                  method: "DELETE"

  /exames/processamentos:
    get:
      tags:
        - Ações do processamento
      summary: Listar processamentos do estabelecimento
      description: |
        Retorna a fila de processamentos do estabelecimento selecionado no token.

        O campo `suportaInterpretacaoPorIA` serve para a aplicação decidir qual fluxo de revisão abrir:
        - `true`: enviar o usuário para a tela de `REVISAO_1`
        - `false`: enviar o usuário para a tela de `REVISAO_2`

        Esse campo é calculado a partir dos itens do processamento e indica se o conjunto suporta interpretação estruturada por IA.
      parameters:
        - name: status
          in: query
          required: false
          description: Filtra a fila por status do processamento.
          schema:
            type: string
            enum:
              - PROCESSANDO
              - AGUARDANDO_REVISAO
              - ERRO
      responses:
        '200':
          description: Fila de processamentos retornada com sucesso.
          content:
            application/json:
              example:
                processamentos:
                  - id: "3e32642d-5c3c-45a8-b834-e8e4cb312609"
                    paciente:
                      id: "paciente-123"
                      nome: "João da Silva"
                      cpf: "12345678900"
                    exames: "Hemograma Completo + Glicose em Jejum"
                    status: "AGUARDANDO_REVISAO"
                    createdAt: "2023-11-20T10:00:00.000Z"
                    suportaInterpretacaoPorIA: true
                    mensagemErro: null
                  - id: "8aa18d6d-8514-4316-958c-11b0ab944d25"
                    paciente:
                      id: "paciente-456"
                      nome: "Maria Oliveira"
                      cpf: "98765432100"
                    exames: "Ultrassonografia de Abdome Total"
                    status: "AGUARDANDO_REVISAO"
                    createdAt: "2023-11-21T09:30:00.000Z"
                    suportaInterpretacaoPorIA: false
                    mensagemErro: null

  /exames/processamentos/{processamentoId}/alterar-arquivo:
    post:
      tags:
        - Ações do processamento
      summary: Alterar arquivo PDF de processamento
      description: Permite reenviar um novo arquivo PDF para um processo de unificação que apresentou falha. **O status atual deve ser obrigatoriamente ERRO**.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento (vivaLabsProcessamentoId)
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: O novo arquivo PDF
      responses:
        '200':
          description: Arquivo alterado e reenviado para a leitura na IA com sucesso. O status será transicionado para PROCESSANDO.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "PROCESSANDO"
        '400':
          description: Erro de regra de negócio (ex. status inválido).
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro podem ter arquivo alterado."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '404':
          description: Processamento não encontrado para o estabelecimento atual.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '422':
          description: |
            Arquivo não enviado ou inválido. Pode retornar duas mensagens distintas:
            - `"Arquivo PDF é obrigatório para alterar o processamento."` — nenhum arquivo foi enviado no form-data.
            - `"Arquivo PDF inválido ou vazio."` — arquivo enviado está vazio ou corrompido.
          content:
            application/json:
              example:
                error:
                  message: "Arquivo PDF é obrigatório para alterar o processamento."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '503':
          description: O serviço de IA recusou ou encerrou a conexão.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 503
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '504':
          description: O serviço de IA não respondeu dentro do tempo limite.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 504
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"

  /exames/processamentos/{processamentoId}/tentar-novamente:
    post:
      tags:
        - Ações do processamento
      summary: Tentar envio para a IA novamente
      description: Tenta reenviar o PDF para a IA novamente (válido apenas para processamentos que já possuem um arquivo, por exemplo, após falha na rota de alterar arquivo). **O status atual deve ser obrigatoriamente ERRO**.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Processamento reenviado para IA com sucesso.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "PROCESSANDO"
        '400':
          description: Somente processamentos com erro podem ser tentados novamente.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro podem ser tentados novamente."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '422':
          description: Processamento sem arquivo PDF armazenado.
          content:
            application/json:
              example:
                error:
                  message: "Este processamento precisa de um novo PDF para continuar."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '503':
          description: O serviço de IA recusou ou encerrou a conexão.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 503
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '504':
          description: O serviço de IA não respondeu dentro do tempo limite.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 504
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"

  /exames/processamentos/{processamentoId}/cancelar:
    delete:
      tags:
        - Ações do processamento
      summary: Cancelar processamento 
      description: Cancela um processamento de IA definitivamente. Exclui o processamento atual, apaga os dados extraídos pela IA e libera os pedidos de exames individualmente de volta para a fila pendente. O status atual deve ser `ERRO` ou `AGUARDANDO_REVISAO`.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Processamento cancelado e exames desvinculados com sucesso.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                cancelado: true
        '400':
          description: O processamento precisa estar com erro ou aguardando revisão.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro ou aguardando revisão podem ser cancelados."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/cancelar"
                  method: "DELETE"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/cancelar"
                  method: "DELETE"

  /exames/processamentos/anexos:
    post:
      tags:
        - Ações do processamento
      summary: Enviar PDFs de exames para processamento (com ou sem IA)
      description: |
        Recebe os arquivos PDF dos exames do paciente e cria/processa os itens de revisão.

        Para cada arquivo enviado, o sistema verifica se já existe um processamento em andamento para aquele exame e o reaproveita quando possível. Caso contrário, um novo processamento é criado automaticamente.

        A requisição deve ser enviada no formato `multipart/form-data`, com os campos organizados assim:
        - `pacienteId` — ID do paciente
        - `anexos[0][exameId]` ou `anexos[0][grupoId]` ou `anexos[0][avulso]` — identifica a qual exame o arquivo pertence
        - `anexos[0][tipoAvulso]`, `anexos[0][nomeExame]`, `anexos[0][extrairPorIA]`, `anexos[0][catalogoExameIds]`, `anexos[0][arquivo]` — detalhes do arquivo
        - `anexos[1][...]` e assim por diante, para múltiplos arquivos

        **Como preencher cada arquivo (anexo):**
        - **Exame avulso laboratorial com IA**: enviar `avulso: "true"`, `tipoAvulso: "LABORATORIAL"`, `nomeExame`, `extrairPorIA: true`, `catalogoExameIds` e `arquivo`.
          - Com `extrairPorIA: true`, o backend envia para IA e o status inicial vai para `PROCESSANDO`.
        - **Exame avulso sem IA** (qualquer tipo, inclusive laboratorial): enviar `avulso: "true"`, `tipoAvulso`, `nomeExame` e `arquivo`.
          - Quando `extrairPorIA` for `false` (ou ausente), não chama IA e o status vai direto para `AGUARDANDO_REVISAO`.
        - Em anexos avulsos, `nomeExame` é obrigatório.
        - **Vinculado a um pedido de exame**: enviar `exameId` e `arquivo`.
        - **Vinculado a um grupo de unificação já existente**: enviar `grupoId` e `arquivo`.
        - Para exames não avulsos, é obrigatório informar exatamente um destino: `exameId` ou `grupoId` (não os dois).
        - O campo `nomeExame` é opcional para exames não avulsos e pode ser usado para alterar o nome salvo no processamento.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - pacienteId
                - anexos
              properties:
                pacienteId:
                  type: string
                  format: uuid
                anexos:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      exameId:
                        type: string
                        format: uuid
                        description: ID do pedido de exame ao qual o PDF será vinculado.
                      grupoId:
                        type: string
                        format: uuid
                        description: ID do grupo de unificação ao qual o PDF será vinculado, quando o exame já foi agrupado anteriormente.
                      avulso:
                        type: string
                        enum:
                          - 'true'
                          - 'false'
                      tipoAvulso:
                        type: string
                        enum:
                          - IMAGEM
                          - LABORATORIAL
                          - OUTROS
                      nomeExame:
                        type: string
                        description: Obrigatório para anexos avulsos (com ou sem IA).
                      extrairPorIA:
                        type: boolean
                        description: Habilita envio para IA apenas em anexos avulsos laboratoriais. Quando `false` (ou ausente), `catalogoExameIds` é ignorado.
                      catalogoExameIds:
                        type: array
                        description: Permitido apenas para avulso laboratorial. Só é considerado quando `extrairPorIA=true` e deve conter ao menos 1 ID de exame de catálogo com suporte à IA.
                        items:
                          type: string
                          format: uuid
                      arquivo:
                        type: string
                        format: binary
            examples:
              exameExistente:
                summary: Anexo vinculado a um exame existente
                value:
                  pacienteId: "9b2d29b6-c8df-4f8b-8b84-c2b51fb1fd5d"
                  anexos:
                    - exameId: "b098c0d6-22f8-4bab-84c1-510e920d4df7"
                      nomeExame: "Hemograma Completo"
                      arquivo: "(binary)"
              avulso:
                summary: Anexo avulso sem IA
                value:
                  pacienteId: "9b2d29b6-c8df-4f8b-8b84-c2b51fb1fd5d"
                  anexos:
                    - avulso: "true"
                      tipoAvulso: "LABORATORIAL"
                      extrairPorIA: false
                      nomeExame: "Vitamina D"
                      arquivo: "(binary)"
              avulsoLaboratorialComIa:
                summary: Anexo avulso laboratorial com IA
                value:
                  pacienteId: "9b2d29b6-c8df-4f8b-8b84-c2b51fb1fd5d"
                  anexos:
                    - avulso: "true"
                      tipoAvulso: "LABORATORIAL"
                      extrairPorIA: true
                      nomeExame: "Hemograma Completo"
                      catalogoExameIds:
                        - "e8f8c5c8-b8d6-4bc1-9fb4-6d43f2faef0d"
                        - "75e6bca2-f274-4ca5-a7a2-f0d53ce32ab3"
                      arquivo: "(binary)"
      responses:
        '202':
          description: Arquivos recebidos com sucesso. Cada item pode ter sido enviado para IA (`PROCESSANDO`), colocado direto em revisão (`AGUARDANDO_REVISAO`) ou registrado como falha individual.
          content:
            application/json:
              example:
                processamentosEnviados:
                  - processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                    status: "PROCESSANDO"
                  - processamentoId: "c7c57d2a-6da1-4cf0-ab24-d8bd8c90f54f"
                    status: "AGUARDANDO_REVISAO"
                processamentosComFalha:
                  - processamentoId: "f6c1847b-fca9-4f4f-bfe9-919f86dd15f6"
                    motivo: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
        '400':
          description: |
            Dados inválidos ou regra de negócio não atendida. Exemplos de mensagens retornadas:
            - `"Este exame está associado a múltiplos processamentos. Selecione o grupo explicitamente para anexar o PDF."` — ocorre quando o exame pertence a mais de um grupo e o sistema não sabe a qual enviar.
            - `"Cada anexo deve ser avulso (com tipoAvulso) ou informar exatamente um alvo (exameId ou grupoId)."` — o item não foi identificado corretamente.
            - `"Nome do exame é obrigatório para exames avulsos."` — faltou informar o nome do exame avulso.
          content:
            application/json:
              example:
                error:
                  message: "Cada anexo deve ser avulso (com tipoAvulso) ou informar exatamente um alvo (exameId ou grupoId)."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/anexos"
                  method: "POST"
        '404':
          description: |
            Paciente, exame ou grupo não encontrado. Exemplos de mensagens retornadas:
            - `"Paciente não encontrado."` — o `pacienteId` informado não existe no sistema.
            - `"Grupo de exames não encontrado para o paciente informado."` — o grupo informado não pertence a esse paciente.
            - `"Exame não encontrado para o paciente informado."` — o pedido de exame informado não pertence a esse paciente.
          content:
            application/json:
              example:
                error:
                  message: "Paciente não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/anexos"
                  method: "POST"
        '422':
          description: |
            Arquivo ausente ou em formato inválido. Exemplos de mensagens retornadas:
            - `"O arquivo do anexo 1 não foi enviado na requisição."` — o campo `arquivo` de um dos itens está faltando (o número indica a posição do anexo, começando em 1).
            - `"Apenas arquivos PDF são permitidos!"` — foi enviado um arquivo que não é PDF.
            - `"Os exames do catálogo só podem ser informados em anexos avulsos do tipo laboratorial."` — uso indevido do campo `catalogoExameIds`.
            - `"Informe os exames do catálogo quando a extração de dados pela IA estiver habilitada."` — `extrairPorIA` foi habilitado sem `catalogoExameIds`.
            - `"A extração de dados pela IA só pode ser habilitada em anexos avulsos do tipo laboratorial."` — uso indevido do campo `extrairPorIA`.
            - `"Informe ao menos um exame do catálogo para extração por IA."` — `catalogoExameIds` foi enviado vazio com `extrairPorIA=true`.
            - `"Um ou mais exames selecionados não são do tipo laboratorial ou não têm suporte à interpretação por IA."` — IDs inválidos para fluxo com IA.
          content:
            application/json:
              example:
                error:
                  message: "O arquivo do anexo 1 não foi enviado na requisição."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/anexos"
                  method: "POST"

  /exames/processamentos/resultado-ia:
    post:
      tags:
        - Integração IA
      summary: Callback da IA para persistir resultados extraídos
      description: |
        Endpoint de callback usado pela integração da IA após o processamento do PDF.

        O callback aceita:
        - `status: SUCESSO` com resultados estruturados em `resultados`
        - `status: ERRO` com mensagem em `erro`

        Em `SUCESSO`, além de `exams`, pode vir `unmapped_exam_names`, com nomes detectados no PDF fora dos exames enviados para extração estruturada.
      requestBody:
        required: true
        content:
          application/json:
            examples:
              sucesso:
                summary: Retorno com extração estruturada + nomes não mapeados
                value:
                  processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                  status: "SUCESSO"
                  resultados:
                    exam_date: "2026-04-09"
                    laboratory_name: "Laboratório Exemplo"
                    exams:
                      - id: "e8f8c5c8-b8d6-4bc1-9fb4-6d43f2faef0d"
                        type: "LABORATORIAL"
                        categories:
                          - name: "Bioquímica"
                            fields: []
                    unmapped_exam_names:
                      - "Ferritina"
                      - "Vitamina B12"
              erro:
                summary: Retorno de erro da IA
                value:
                  processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                  status: "ERRO"
                  erro: "Falha ao extrair conteúdo do PDF."
      responses:
        '200':
          description: Callback recebido e processado.
          content:
            application/json:
              examples:
                aguardandoRevisao:
                  value:
                    processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                    status: "AGUARDANDO_REVISAO"
                erro:
                  value:
                    processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                    status: "ERRO"
  
  /exames/processamentos/{processamentoId}/revisao:
    get:
      tags:
        - Revisão IA
      summary: Carregar dados do processamento para revisão humana
      description: |
        Retorna os dados do processamento prontos para revisão humana, já organizados para consumo da tela.

        Quando `tipoRevisao = REVISAO_1`, o retorno inclui `gruposExames`, `subGrupos`, `examesSemSubgrupos` e `resultados`.
        Também pode incluir `examesSomenteNomeDetectados`, que são nomes identificados no PDF sem extração estruturada.

        Quando `tipoRevisao = REVISAO_2`, o retorno não possui resultados estruturados; nesse caso, os campos relevantes são `nomeExame`, `observacao` e os metadados do processamento.

        A IA fornece principalmente:
        - `exam_date`, que é refletido em `dataRealizacao`
        - `laboratory_name`, que é refletido em `laboratorioDetectado`
        - os resultados extraídos por exame/campo/valor, que são convertidos pelo backend em `resultados`, `inputResultado` e `InputsValoresReferencia`

        O agrupamento final em `gruposExames`, `subGrupos` e `examesSemSubgrupos` é montado pelo backend com base no catálogo de exames e nos resultados persistidos do processamento.

        **Estrutura do retorno:**
        - `gruposExames`: lista de grupos de exames do processamento
        - `subGrupos`: subdivisão opcional dentro de cada grupo
        - `examesSemSubgrupos`: exames do grupo que não pertencem a um subgrupo
        - `arquivoPdfUrl`: key/path interna do arquivo no storage (sem `https://`)
        - `resultados`: lista de resultados extraídos para cada exame
        - se a IA não retornar valor para algum parâmetro, o backend devolve o input vazio (placeholder) para preenchimento manual
        - `inputResultado.tipo`: pode ser `numerico` ou `texto`
        - `InputsValoresReferencia`: referências extraídas pela IA, preservando o tipo e o rótulo exibido na revisão
        - `examesSomenteNomeDetectados`: nomes detectados pela IA fora da seleção de exames estruturados
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Payload de revisão retornado com os dados organizados para a interface de revisão.
          content:
            application/json:
              examples:
                revisao1:
                  summary: REVISAO_1 com resultados estruturados
