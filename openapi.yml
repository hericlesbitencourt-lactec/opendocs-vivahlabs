  /exames/processamentos/{processamentoId}/finalizar-revisao-1:
    post:
      tags:
        - Revisão IA
      summary: Confirmar revisão e salvar correções dos resultados
      description: |
        Conclui um processamento do tipo `REVISAO_1`, persistindo as correções feitas pelo operador sobre os resultados extraídos pela IA.
        Após a confirmação, o processamento transiciona para `CONCLUIDO`.

        **Campos opcionais do processamento:**
        - `laboratorioDetectado`: corrige o nome do laboratório detectado pela IA. Só é atualizado se for enviado no body.
        - `dataRealizacao`: corrige a data do exame (formato ISO-8601). Só é atualizado se for enviado no body.

        **Edição de resultado por tipo:**
        - Numérico: enviar `valor` como string (ex: `"15.22"`). Para ajustar a referência, incluir `referenciaMin` e/ou `referenciaMax`.
        - Textual: enviar `valor` como texto livre (ex: `"não reagente"`). Para ajustar a referência, incluir `referenciaTexto`.
        - Sem edição de referência: omitir os campos de referência — o backend mantém o valor já persistido.
        - Limpeza de referência: enviar os três campos de referência como `null` — o backend remove a referência existente.
        - Sem edição de resultado: enviar `resultado: null` — o exame é concluído sem atualizar o resultado.
      parameters:
        - name: processamentoId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              exames:
                - id: "b098c0d6-22f8-4bab-84c1-510e920d4df7"
                  resultado:
                    id: "3dbac066-e018-4fd5-bcbc-38d1aec23f35"
                    valor: "15.22"
                    referenciaMin: "13.5"
                    referenciaMax: "17.5"
                    referenciaTexto: null
                - id: "7b66b34f-72c3-4573-8e89-0bf2a155ac17"
                  resultado:
                    id: "a669011d-3137-49bc-a81d-73e27d4f1d72"
                    valor: "42.73"
                    referenciaMin: "41"
                    referenciaMax: "53"
                    referenciaTexto: null
                - id: "66b9c0b7-e59d-4d68-b0f0-9e18918ff220"
                  resultado:
                    id: "caa2d0d2-f02f-49be-b461-0d0c24476c5f"
                    valor: "não reagente"
                    referenciaMin: null
                    referenciaMax: null
                    referenciaTexto: "não reagente"
                - id: "d7c0d2f1-f02f-49be-b461-0d0c24476aaa"
                  resultado: null
      responses:
        '200':
          description: Correções persistidas. O processamento transicionou para `CONCLUIDO`.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "CONCLUIDO"
        '400':
          description: |
            Regra de negócio violada. Pode retornar quatro mensagens distintas:
            - `"Somente processamentos aguardando revisão podem ser finalizados."` — o processamento não está em `AGUARDANDO_REVISAO`.
            - `"Este processamento não pertence ao fluxo de revisão 1."` — o `tipoRevisao` do processamento é `REVISAO_2`.
            - `"Exame informado na revisão não pertence ao processamento."` — um `id` de exame no body não está vinculado a este processamento.
            - `"Resultado informado na revisão não pertence ao processamento."` — o `resultado.id` não pertence ao exame informado.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos aguardando revisão podem ser finalizados."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-1"
                  method: "POST"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-1"
                  method: "POST"

  /exames/processamentos/{processamentoId}/finalizar-revisao-2:
    post:
      tags:
        - Revisão IA
      summary: Confirmar revisão e salvar observação do laudo
      description: |
        Conclui um processamento do tipo `REVISAO_2`, persistindo a observação inserida pelo operador.
        Após a confirmação, o processamento transiciona para `CONCLUIDO`.

        Não há edição de resultados tabelados nessa rota. Para corrigir `valor`, `referenciaMin`, `referenciaMax` ou `referenciaTexto`, use a rota `finalizar-revisao-1`.

        **Campos opcionais:**
        - `observacao`: texto livre com o laudo revisado. Só é atualizada se for enviada no body. Se vier como `null` ou vazio, a observação é limpa.
        - `laboratorioDetectado`: corrige o nome do laboratório detectado pela IA. Só é atualizado se for enviado no body.
        - `dataRealizacao`: corrige a data do exame (formato ISO-8601). Só é atualizada se for enviada no body.

        Retorna `400` se o processamento for do tipo `REVISAO_1` ou não estiver em `AGUARDANDO_REVISAO`.
      parameters:
        - name: processamentoId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              observacao: "Laudo revisado manualmente."
      responses:
        '200':
          description: Observação persistida. O processamento transicionou para `CONCLUIDO`.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "CONCLUIDO"
        '400':
          description: |
            Regra de negócio violada. Pode retornar duas mensagens distintas:
            - `"Somente processamentos aguardando revisão podem ser finalizados."` — o processamento não está em `AGUARDANDO_REVISAO`.
            - `"Este processamento não pertence ao fluxo de revisão 2."` — o `tipoRevisao` do processamento é `REVISAO_1`.
          content:
            application/json:
              example:
                error:
                  message: "Este processamento não pertence ao fluxo de revisão 2."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-2"
                  method: "POST"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao-2"
                  method: "POST"
