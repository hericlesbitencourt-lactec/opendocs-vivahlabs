openapi: 3.0.3
info:
  title: API VivaLabs
  version: 1.0.0
  description: |
    Documentação das rotas de ações de processamentos (VivaLabs) de unificação de exames e fluxos de revisão IA.
paths:
  /exames/processamentos/{processamentoId}/alterar-arquivo:
    post:
      tags:
        - Ações do processamento
      summary: Alterar arquivo PDF de processamento
      description: Permite reenviar um novo arquivo PDF para um processo de unificação que apresentou falha. **O status atual deve ser obrigatoriamente ERRO**.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento (vivaLabsProcessamentoId)
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: O novo arquivo PDF
      responses:
        '200':
          description: Arquivo alterado e reenviado para a leitura na IA com sucesso. O status será transicionado para PROCESSANDO.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "PROCESSANDO"
        '400':
          description: Erro de regra de negócio (ex. status inválido).
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro podem ter arquivo alterado."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '404':
          description: Processamento não encontrado para o usuário atual.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '422':
          description: |
            Arquivo não enviado ou inválido. Pode retornar duas mensagens distintas:
            - `"Arquivo PDF é obrigatório para alterar o processamento."` — nenhum arquivo foi enviado no form-data.
            - `"Arquivo PDF inválido ou vazio."` — arquivo enviado está vazio ou corrompido.
          content:
            application/json:
              example:
                error:
                  message: "Arquivo PDF é obrigatório para alterar o processamento."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '503':
          description: Não foi possível comunicar com o serviço de IA.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 503
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
  
  /exames/processamentos/{processamentoId}/tentar-novamente:
    post:
      tags:
        - Ações do processamento
      summary: Tentar envio para a IA novamente
      description: Tenta reenviar o PDF para a IA novamente (válido apenas para processamentos que já possuem um arquivo, por exemplo, após falha na rota de alterar arquivo). **O status atual deve ser obrigatoriamente ERRO**.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Processamento reenviado para IA com sucesso.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "PROCESSANDO"
        '400':
          description: Somente processamentos com erro podem ser tentados novamente.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro podem ser tentados novamente."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '422':
          description: Processamento sem arquivo PDF armazenado.
          content:
            application/json:
              example:
                error:
                  message: "Este processamento precisa de um novo PDF para continuar."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '503':
          description: Não foi possível comunicar com o serviço de IA.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 503
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
  
  /exames/processamentos/{processamentoId}/cancelar:
    delete:
      tags:
        - Ações do processamento
      summary: Cancelar processamento 
      description: Cancela um processamento de IA definitivamente. Exclui o processamento atual, apaga os dados extraídos pela IA e libera os pedidos de exames individualmente de volta para a fila pendente. O status atual deve ser `ERRO` ou `AGUARDANDO_REVISAO`.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Processamento cancelado e exames desvinculados com sucesso.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                cancelado: true
        '400':
          description: O processamento precisa estar com erro ou aguardando revisão.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro ou aguardando revisão podem ser cancelados."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/cancelar"
                  method: "DELETE"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/cancelar"
                  method: "DELETE"
  
  /exames/processamentos/{processamentoId}/revisao:
    get:
      tags:
        - Revisão IA
      summary: Buscar dados pendentes para revisão
      description: Retorna os parâmetros extraídos pela IA para a tela de revisão e auditoria do usuário. O status deve ser `AGUARDANDO_REVISAO`. Cada exame da revisão expõe no máximo um `resultado`. Quando o resultado for numérico, `resultadoNumerico` vem preenchido e `resultadoTexto` vem `null`. Quando o resultado for textual, como "reagente" ou "não reagente", `resultadoTexto` vem preenchido e `resultadoNumerico` vem `null`. A `observacao` retornada neste payload pertence ao `VivaLabsProcessamento` inteiro, não a cada exame individual.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Detalhes carregados com sucesso.
          content:
            application/json:
              example:
                id: "3e32642d-5c3c-45a8-b834-e8e4cb312609"
                status: "AGUARDANDO_REVISAO"
                arquivoPdfUrl: "https://bucket-name.s3.amazonaws.com/viva-labs/exames/..."
                dataRealizacao: "2023-11-20T10:00:00.000Z"
                laboratorioDetectado: "Laboratório Modelo"
                mensagemErro: null
                observacao: "Observação geral do processamento."
                paciente:
                  nome: "Paciente Exemplo"
                  cpf: "12345678900"
                  nascimento: "1990-01-01T00:00:00.000Z"
                exames:
                  - id: "item-exame-123"
                    nome: "Hemograma Completo"
                    tipo: "LABORATORIAL"
                    leituraIaHabilitada: true
                    resultado:
                      id: "resultado-123"
                      descricao: "Hemoglobina"
                      unidadeMedida: "g/dL"
                      unidadeMedidaPadrao: "g/dL"
                      unidadeMedidaPDF: "g/L"
                      divergenciaUnidade: true
                      valor: "15.4"
                      resultadoNumerico: 15.4
                      resultadoTexto: null
                      referenciaMin: "13.5"
                      referenciaMax: "17.5"
                      referenciaTexto: null
                      valorReferenciaPDF: "{\"min\":\"13.5\",\"max\":\"17.5\",\"value\":null,\"sex\":\"male\",\"age_min\":18,\"age_max\":59}"
                  - id: "item-exame-456"
                    nome: "HIV"
                    tipo: "LABORATORIAL"
                    leituraIaHabilitada: true
                    resultado:
                      id: "resultado-124"
                      descricao: "HIV"
                      unidadeMedida: null
                      unidadeMedidaPadrao: null
                      unidadeMedidaPDF: null
                      divergenciaUnidade: false
                      valor: "não reagente"
                      resultadoNumerico: null
                      resultadoTexto: "não reagente"
                      referenciaMin: null
                      referenciaMax: null
                      referenciaTexto: "não reagente"
                      valorReferenciaPDF: "{\"min\":null,\"max\":null,\"value\":\"não reagente\",\"sex\":null,\"age_min\":null,\"age_max\":null}"
        '400':
          description: O processamento não está aguardando revisão.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não está aguardando revisão."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/revisao"
                  method: "GET"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/revisao"
                  method: "GET"

  /exames/processamentos/{processamentoId}/finalizar-revisao:
    post:
      tags:
        - Revisão IA
      summary: Finalizar edição/revisão
      description: Finaliza a revisão de um único `VivaLabsProcessamento`, identificado pelo `processamentoId` da rota. O body pode conter vários exames, mas todos devem pertencer a esse mesmo processamento. Cada exame aceita no máximo um `resultado` editável. A `observacao`, quando informada, é geral do `VivaLabsProcessamento` e fica fora da lista de `exames`.
      parameters:
        - name: processamentoId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            example:
              observacao: "Processamento revisado manualmente antes da conclusão."
              exames:
                - id: "b098c0d6-22f8-4bab-84c1-510e920d4df7"
                  resultado:
                    id: "3dbac066-e018-4fd5-bcbc-38d1aec23f35"
                    valor: "15.22"
                    referenciaMin: "13.5"
                    referenciaMax: "17.5"
                    referenciaTexto: null
                - id: "7b66b34f-72c3-4573-8e89-0bf2a155ac17"
                  resultado:
                    id: "a669011d-3137-49bc-a81d-73e27d4f1d72"
                    valor: "42.73"
                    referenciaMin: "41"
                    referenciaMax: "53"
                    referenciaTexto: null
                - id: "66b9c0b7-e59d-4d68-b0f0-9e18918ff220"
                  resultado:
                    id: "caa2d0d2-f02f-49be-b461-0d0c24476c5f"
                    valor: "87"
                    referenciaMin: "80"
                    referenciaMax: "100"
                    referenciaTexto: null
      responses:
        '200':
          description: Resultados persistidos e validados pela operação com sucesso.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "CONCLUIDO"
        '400':
          description: O processamento precisa estar como aguardando revisão.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos aguardando revisão podem ser finalizados."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao"
                  method: "POST"
        '404':
          description: Processamento não foi encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/finalizar-revisao"
                  method: "POST"
