openapi: 3.0.3
info:
  title: API VivaLabs
  version: 1.0.0
  description: |
    Documentação das rotas de ações de processamentos (VivaLabs) de unificação de exames e fluxos de revisão IA.
paths:
  /exames/processamentos/{processamentoId}/alterar-arquivo:
    post:
      tags:
        - Ações do processamento
      summary: Alterar arquivo PDF de processamento
      description: Permite reenviar um novo arquivo PDF para um processo de unificação que apresentou falha. **O status atual deve ser obrigatoriamente ERRO**.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento (vivaLabsProcessamentoId)
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: O novo arquivo PDF
      responses:
        '200':
          description: Arquivo alterado e reenviado para a leitura na IA com sucesso. O status será transicionado para PROCESSANDO.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "PROCESSANDO"
        '400':
          description: Erro de regra de negócio (ex. status inválido).
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro podem ter arquivo alterado."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '404':
          description: Processamento não encontrado para o usuário atual.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '422':
          description: |
            Arquivo não enviado ou inválido. Pode retornar duas mensagens distintas:
            - `"Arquivo PDF é obrigatório para alterar o processamento."` — nenhum arquivo foi enviado no form-data.
            - `"Arquivo PDF inválido ou vazio."` — arquivo enviado está vazio ou corrompido.
          content:
            application/json:
              example:
                error:
                  message: "Arquivo PDF é obrigatório para alterar o processamento."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '503':
          description: O serviço de IA recusou ou encerrou a conexão.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 503
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"
        '504':
          description: O serviço de IA não respondeu dentro do tempo limite.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 504
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/alterar-arquivo"
                  method: "POST"

  /exames/processamentos/{processamentoId}/tentar-novamente:
    post:
      tags:
        - Ações do processamento
      summary: Tentar envio para a IA novamente
      description: Tenta reenviar o PDF para a IA novamente (válido apenas para processamentos que já possuem um arquivo, por exemplo, após falha na rota de alterar arquivo). **O status atual deve ser obrigatoriamente ERRO**.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Processamento reenviado para IA com sucesso.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                status: "PROCESSANDO"
        '400':
          description: Somente processamentos com erro podem ser tentados novamente.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro podem ser tentados novamente."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '422':
          description: Processamento sem arquivo PDF armazenado.
          content:
            application/json:
              example:
                error:
                  message: "Este processamento precisa de um novo PDF para continuar."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '503':
          description: O serviço de IA recusou ou encerrou a conexão.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 503
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"
        '504':
          description: O serviço de IA não respondeu dentro do tempo limite.
          content:
            application/json:
              example:
                error:
                  message: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
                  status: 504
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/tentar-novamente"
                  method: "POST"

  /exames/processamentos/{processamentoId}/cancelar:
    delete:
      tags:
        - Ações do processamento
      summary: Cancelar processamento 
      description: Cancela um processamento de IA definitivamente. Exclui o processamento atual, apaga os dados extraídos pela IA e libera os pedidos de exames individualmente de volta para a fila pendente. O status atual deve ser `ERRO` ou `AGUARDANDO_REVISAO`.
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Processamento cancelado e exames desvinculados com sucesso.
          content:
            application/json:
              example:
                processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                cancelado: true
        '400':
          description: O processamento precisa estar com erro ou aguardando revisão.
          content:
            application/json:
              example:
                error:
                  message: "Somente processamentos com erro ou aguardando revisão podem ser cancelados."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/cancelar"
                  method: "DELETE"
        '404':
          description: Processamento não encontrado.
          content:
            application/json:
              example:
                error:
                  message: "Processamento não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/id/cancelar"
                  method: "DELETE"

  /exames/processamentos/anexos:
    post:
      tags:
        - Ações do processamento
      summary: Enviar PDFs de exames para análise pela IA
      description: |
        Recebe os arquivos PDF dos exames do paciente e os envia para leitura e análise automática pela inteligência artificial.

        Para cada arquivo enviado, o sistema verifica se já existe um processamento em andamento para aquele exame e o reaproveita quando possível. Caso contrário, um novo processamento é criado automaticamente.

        A requisição deve ser enviada no formato `multipart/form-data`, com os campos organizados assim:
        - `pacienteId` — ID do paciente
        - `anexos[0][exameId]` ou `anexos[0][grupoId]` ou `anexos[0][avulso]` — identifica a qual exame o arquivo pertence
        - `anexos[0][tipoAvulso]`, `anexos[0][nomeExame]`, `anexos[0][arquivo]` — detalhes do arquivo
        - `anexos[1][...]` e assim por diante, para múltiplos arquivos

        **Como preencher cada arquivo (anexo):**
        - **Exame avulso** (não vinculado a nenhum pedido): enviar `avulso: "true"`, `tipoAvulso`, `nomeExame` e `arquivo`.
        - **Vinculado a um pedido de exame**: enviar `exameId` e `arquivo`.
        - **Vinculado a um grupo de unificação já existente**: enviar `grupoId` e `arquivo`.
        - Para exames não avulsos, é obrigatório informar exatamente um destino: `exameId` ou `grupoId` (não os dois).
        - O campo `nomeExame` é opcional para exames não avulsos e pode ser usado para alterar o nome salvo no processamento.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - pacienteId
                - anexos
              properties:
                pacienteId:
                  type: string
                  format: uuid
                anexos:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      exameId:
                        type: string
                        format: uuid
                        description: ID do pedido de exame ao qual o PDF será vinculado.
                      grupoId:
                        type: string
                        format: uuid
                        description: ID do grupo de unificação ao qual o PDF será vinculado, quando o exame já foi agrupado anteriormente.
                      avulso:
                        type: string
                        enum:
                          - 'true'
                          - 'false'
                      tipoAvulso:
                        type: string
                        enum:
                          - IMAGEM
                          - LABORATORIAL
                          - OUTROS
                      nomeExame:
                        type: string
                      arquivo:
                        type: string
                        format: binary
            examples:
              exameExistente:
                summary: Anexo vinculado a um exame existente
                value:
                  pacienteId: "9b2d29b6-c8df-4f8b-8b84-c2b51fb1fd5d"
                  anexos:
                    - exameId: "b098c0d6-22f8-4bab-84c1-510e920d4df7"
                      nomeExame: "Hemograma Completo"
                      arquivo: "(binary)"
              avulso:
                summary: Anexo avulso
                value:
                  pacienteId: "9b2d29b6-c8df-4f8b-8b84-c2b51fb1fd5d"
                  anexos:
                    - avulso: "true"
                      tipoAvulso: "LABORATORIAL"
                      nomeExame: "Vitamina D"
                      arquivo: "(binary)"
      responses:
        '202':
          description: Arquivos recebidos com sucesso. Cada item pode ter sido enviado para análise da IA normalmente ou registrado como falha individual — verifique os campos `processamentosEnviados` e `processamentosComFalha` na resposta.
          content:
            application/json:
              example:
                processamentosEnviados:
                  - processamentoId: "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6"
                    status: "PROCESSANDO"
                processamentosComFalha:
                  - processamentoId: "f6c1847b-fca9-4f4f-bfe9-919f86dd15f6"
                    motivo: "Não foi possível processar este exame no momento. Tente novamente mais tarde."
        '400':
          description: |
            Dados inválidos ou regra de negócio não atendida. Exemplos de mensagens retornadas:
            - `"Exame {id} está associado a múltiplos processamentos. Selecione o grupo explicitamente para anexar o PDF."` — ocorre quando o exame pertence a mais de um grupo e o sistema não sabe a qual enviar.
            - `"Cada anexo deve ser avulso (com tipoAvulso) ou informar exatamente um alvo (exameId ou grupoId)."` — o item não foi identificado corretamente.
            - `"Nome do exame é obrigatório para exames avulsos."` — faltou informar o nome do exame avulso.
          content:
            application/json:
              example:
                error:
                  message: "Cada anexo deve ser avulso (com tipoAvulso) ou informar exatamente um alvo (exameId ou grupoId)."
                  status: 400
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/anexos"
                  method: "POST"
        '404':
          description: |
            Paciente, exame ou grupo não encontrado. Exemplos de mensagens retornadas:
            - `"Paciente não encontrado."` — o `pacienteId` informado não existe no sistema.
            - `"Grupo de unificação {id} não encontrado para o paciente."` — o grupo informado não pertence a esse paciente.
            - `"Exame {id} não encontrado para o paciente."` — o pedido de exame informado não pertence a esse paciente.
          content:
            application/json:
              example:
                error:
                  message: "Paciente não encontrado."
                  status: 404
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/anexos"
                  method: "POST"
        '422':
          description: |
            Arquivo ausente ou em formato inválido. Exemplos de mensagens retornadas:
            - `"Arquivo do anexo 0 ('anexos[0][arquivo]') não foi enviado na requisição."` — o campo `arquivo` de um dos itens está faltando.
            - `"Apenas arquivos PDF são permitidos!"` — foi enviado um arquivo que não é PDF.
          content:
            application/json:
              example:
                error:
                  message: "Arquivo do anexo 0 ('anexos[0][arquivo]') não foi enviado na requisição."
                  status: 422
                  timestamp: "2023-11-20T10:00:00.000Z"
                  path: "/exames/processamentos/anexos"
                  method: "POST"
  
  /exames/processamentos/{processamentoId}/revisao:
    get:
      tags:
        - Revisão IA
      summary: Carregar dados do processamento para revisão humana
      description: |
        Retorna os dados do processamento prontos para revisão humana, já organizados para consumo da tela.

        A IA fornece principalmente:
        - `exam_date`, que é refletido em `dataRealizacao`
        - `laboratory_name`, que é refletido em `laboratorioDetectado`
        - os resultados extraídos por exame/campo/valor, que são convertidos pelo backend em `resultados`, `inputResultado` e `InputsValoresRefencia`

        O agrupamento final em `gruposExames`, `subGrupos` e `examesSemSubgrupos` é montado pelo backend com base no catálogo de exames e nos resultados persistidos do processamento.

        **Estrutura do retorno:**
        - `gruposExames`: lista de grupos de exames do processamento
        - `subGrupos`: subdivisão opcional dentro de cada grupo
        - `examesSemSubgrupos`: exames do grupo que não pertencem a um subgrupo
        - `resultados`: lista de resultados extraídos para cada exame
        - `inputResultado.tipo`: pode ser `numerico` ou `texto`
        - `InputsValoresRefencia`: referências extraídas pela IA, preservando o tipo e o rótulo exibido na revisão
      parameters:
        - name: processamentoId
          in: path
          required: true
          description: ID do processamento
          schema:
            type: string
      responses:
        '200':
          description: Payload de revisão retornado com os dados organizados para a interface de revisão.
          content:
            application/json:
              examples:
                revisao:
                  summary: Exemplo de resposta da revisão com grupos, subgrupos e resultados
                  value:
                    id: "3e32642d-5c3c-45a8-b834-e8e4cb312609"
                    tipoRevisao: "REVISAO_1"
                    status: "AGUARDANDO_REVISAO"
                    arquivoPdfUrl: "https://bucket-name.s3.amazonaws.com/viva-labs/exames/resultado.pdf"
                    dataRealizacao: "2023-11-20T10:00:00.000Z"
                    laboratorioDetectado: "Laboratório Modelo"
                    mensagemErro: null
                    observacao: "Observação geral do processamento."
                    responsavel: "Operador Exemplo"
                    unidade: "UBS Centro"
                    paciente:
                      id: "paciente-123"
                      nome: "João da Silva"
                      cpf: "12345678900"
                      nascimento: "1990-01-01T00:00:00.000Z"
                    gruposExames:
                      - id: "grupo-hemograma"
                        nome: "Hemograma Completo"
                        subGrupos:
                          - id: "subgrupo-serie-vermelha"
                            nome: "Série Vermelha"
                            exames:
                              - id: "exame-hemoglobina"
                                nome: "Hemoglobina"
                                resultados:
                                  - id: "res-hemoglobina"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "14.2"
                                    unidadeMedida: "g/dL"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "13.5"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "17.5"
                              - id: "exame-hematocrito"
                                nome: "Hematócrito"
                                resultados:
                                  - id: "res-hematocrito"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "42.0"
                                    unidadeMedida: "%"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "38.0"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "50.0"
                              - id: "exame-eritrocitos"
                                nome: "Eritrócitos"
                                resultados:
                                  - id: "res-eritrocitos"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "4.80"
                                    unidadeMedida: "milhões/µL"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "4.50"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "6.00"
                          - id: "subgrupo-serie-branca"
                            nome: "Série Branca"
                            exames:
                              - id: "exame-leucocitos"
                                nome: "Leucócitos"
                                resultados:
                                  - id: "res-leucocitos"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "7200"
                                    unidadeMedida: "/µL"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "4000"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "11000"
                              - id: "exame-neutrofilos"
                                nome: "Neutrófilos"
                                resultados:
                                  - id: "res-neutrofilos"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "62.0"
                                    unidadeMedida: "%"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "45.0"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "70.0"
                        examesSemSubgrupos:
                          - id: "exame-plaquetas"
                            nome: "Plaquetas"
                            resultados:
                              - id: "res-plaquetas"
                                inputResultado:
                                  tipo: "numerico"
                                  valor: "210000"
                                unidadeMedida: "/µL"
                                InputsValoresRefencia:
                                  - tipo: "numerico"
                                    label: "Min"
                                    valor: "150000"
                                  - tipo: "numerico"
                                    label: "Max"
                                    valor: "400000"
                      - id: "grupo-bioquimica"
                        nome: "Bioquímica"
                        subGrupos:
                          - id: "subgrupo-funcao-renal"
                            nome: "Função Renal"
                            exames:
                              - id: "exame-creatinina"
                                nome: "Creatinina"
                                resultados:
                                  - id: "res-creatinina"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "0.9"
                                    unidadeMedida: "mg/dL"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "0.7"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "1.2"
                              - id: "exame-ureia"
                                nome: "Ureia"
                                resultados:
                                  - id: "res-ureia"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "38.0"
                                    unidadeMedida: "mg/dL"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "15.0"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "45.0"
                          - id: "subgrupo-funcao-hepatica"
                            nome: "Função Hepática"
                            exames:
                              - id: "exame-tgo"
                                nome: "TGO (AST)"
                                resultados:
                                  - id: "res-tgo"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "28.0"
                                    unidadeMedida: "U/L"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "10.0"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "40.0"
                              - id: "exame-tgp"
                                nome: "TGP (ALT)"
                                resultados:
                                  - id: "res-tgp"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "52.0"
                                    unidadeMedida: "U/L"
                                    InputsValoresRefencia:
                                      - tipo: "numerico"
                                        label: "Min"
                                        valor: "7.0"
                                      - tipo: "numerico"
                                        label: "Max"
                                        valor: "41.0"
                        examesSemSubgrupos:
                          - id: "exame-glicose"
                            nome: "Glicose em Jejum"
                            resultados:
                              - id: "res-glicose"
                                inputResultado:
                                  tipo: "numerico"
                                  valor: "95.0"
                                unidadeMedida: "mg/dL"
                                InputsValoresRefencia:
                                  - tipo: "numerico"
                                    label: "Min"
                                    valor: "70.0"
                                  - tipo: "numerico"
                                    label: "Max"
                                    valor: "99.0"
                      - id: "grupo-lipidograma"
                        nome: "Lipidograma"
                        subGrupos:
                          - id: "subgrupo-colesterol"
                            nome: "Colesterol"
                            exames:
                              - id: "exame-col-total"
                                nome: "Colesterol Total"
                                resultados:
                                  - id: "res-col-total"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "198.0"
                                    unidadeMedida: "mg/dL"
                                    InputsValoresRefencia:
                                      - tipo: "texto"
                                        label: "Referência"
                                        valor: "< 200"
                              - id: "exame-hdl"
                                nome: "HDL Colesterol"
                                resultados:
                                  - id: "res-hdl"
                                    inputResultado:
                                      tipo: "numerico"
                                      valor: "55.0"
                                    unidadeMedida: "mg/dL"
                                    InputsValoresRefencia:
                                      - tipo: "texto"
                                        label: "Referência"
                                        valor: "> 40"
                                  - id: "res-hdl-2"
                                    inputResultado:
                                      tipo: "texto"
                                      valor: "reagente"
                                    unidadeMedida: "U/L"
                                    InputsValoresRefencia:
                                      - tipo: "texto"
                                        label: "Referência"
                                        valor: "não reagente"
                              - id: "exame-ldl"
                                nome: "LDL Colesterol"
                                resultados:
                                  - id: "res-ldl"
